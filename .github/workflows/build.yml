name: Build Parallax

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Parallax.app
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build & bundle
        run: ./scripts/bundle-app.sh --release

      - name: Create DMG
        run: |
          hdiutil create -volname "Parallax" \
            -srcfolder build/Parallax.app \
            -ov -format UDZO \
            build/Parallax.dmg

      - name: Upload Parallax.app
        uses: actions/upload-artifact@v4
        with:
          name: Parallax.app
          path: build/Parallax.app

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Parallax.dmg
          path: build/Parallax.dmg
